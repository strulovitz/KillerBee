{% extends "base.html" %}
{% block title %}Login — KillerBee{% endblock %}
{% block content %}
<div class="card" style="max-width:450px;margin:2rem auto">
  <div class="card-header">Log In</div>
  <form method="POST">
    {{ form.hidden_tag() }}
    <div class="form-group">
      <label>{{ form.username.label.text }}</label>
      {{ form.username(class="form-control") }}
    </div>
    <div class="form-group">
      <label>{{ form.password.label.text }}</label>
      {{ form.password(class="form-control") }}
    </div>
    <button type="submit" class="btn btn-red btn-lg" style="width:100%">Log In</button>
  </form>
  <p class="text-muted mt-2 text-center">Don't have an account? <a href="{{ url_for('register') }}">Register</a></p>
</div>
{% endblock %}
