# Debian 13 Trixie preseed for KillerBee Phase 3 Laptop VMs
# Reference: https://www.debian.org/releases/trixie/amd64/apbs04.en.html

# Localization
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

# Network (DHCP)
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string debian-template
d-i netcfg/get_domain string local
d-i netcfg/hostname string debian-template

# Mirror settings
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# Clock and time zone
d-i clock-setup/utc boolean true
d-i time/zone string Asia/Jerusalem
d-i clock-setup/ntp boolean true

# Root password - lock root (login via nir with sudo)
d-i passwd/root-login boolean false

# User nir - password will be overwritten by SSH key only
d-i passwd/user-fullname string nir
d-i passwd/username string nir
d-i passwd/user-password password phase3-placeholder-will-be-replaced
d-i passwd/user-password-again password phase3-placeholder-will-be-replaced
d-i user-setup/allow-password-weak boolean true
d-i user-setup/encrypt-home boolean false

# Partitioning - one big ext4 partition, guided, use entire disk
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-auto/disk string /dev/vda
d-i partman/default_filesystem string ext4
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman-basicfilesystems/no_swap boolean false

# Base system - standard install, no tasks except SSH server
tasksel tasksel/first multiselect ssh-server, standard

# Additional packages
d-i pkgsel/include string openssh-server curl python3 python3-pip python3-venv git ca-certificates sudo wget
d-i pkgsel/upgrade select full-upgrade
d-i pkgsel/update-policy select none

# Ignore popularity contest
popularity-contest popularity-contest/participate boolean false

# Boot loader - install GRUB to the MBR of the disk, no prompt
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean false
d-i grub-installer/bootdev string /dev/vda

# Finish install: reboot automatically, no prompts
d-i finish-install/reboot_in_progress note

# Post-install script runs late in the install, inside the target chroot.
# Sets up sudo NOPASSWD for nir, installs phase3 SSH pubkey, disables password login.
d-i preseed/late_command string \
    in-target mkdir -p /home/nir/.ssh; \
    in-target bash -c 'echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIE2iVsBlB33qIBYRsXvQqgKPoai/ryKBvsW4us9XvxJV phase3-laptop-2026-04-17" > /home/nir/.ssh/authorized_keys'; \
    in-target chmod 700 /home/nir/.ssh; \
    in-target chmod 600 /home/nir/.ssh/authorized_keys; \
    in-target chown -R nir:nir /home/nir/.ssh; \
    in-target bash -c 'echo "nir ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/90-nir'; \
    in-target chmod 0440 /etc/sudoers.d/90-nir; \
    in-target sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config; \
    in-target sed -i 's/^#*PubkeyAuthentication.*/PubkeyAuthentication yes/' /etc/ssh/sshd_config; \
    in-target systemctl enable ssh
